<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Builder with formio.js</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.form.io/formiojs/formio.full.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel panel-scroll">
        <header class="panel-header">
          <h2>1) Build the Form (Drag & Drop)</h2>
        </header>
        <div id="builder" class="canvas"></div>
      </section>

      <section class="panel panel-scroll">
        <header class="panel-header">
          <h2>2) Final Result (Working Form)</h2>
        </header>
        <div id="preview" class="canvas"></div>
      </section>

      <section class="panel panel-full">
        <header class="panel-header">
          <h2>3) Form Data JSON (from step 2)</h2>
        </header>

        <div class="json-grid">
          <article>
            <div class="json-title-row">
              <h3>JSON Components (Schema)</h3>
              <button id="copy-schema" type="button">4) Copy Components JSON</button>
            </div>
            <div id="schema-json" class="json-box json-tree"></div>
          </article>
          <article>
            <h3>Entered Data (submission)</h3>
            <pre id="submission-json" class="json-box">{}</pre>
          </article>
        </div>

        <p id="copy-status" class="copy-status" aria-live="polite"></p>
      </section>
    </main>

    <script src="https://cdn.form.io/formiojs/formio.full.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
